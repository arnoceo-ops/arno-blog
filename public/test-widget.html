<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArnoBot Widget — Preview</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      padding: 48px 24px;
    }
    .label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #999;
      margin: 0 0 12px;
    }
    .frame {
      max-width: 760px;
      margin: 0 auto 64px;
    }
  </style>
</head>
<body>

  <div class="frame">
    <p class="label">Huidige widget</p>
    <div id="arnobot"></div>
    <button onclick="previewCTA()" style="margin-top:12px;padding:8px 16px;background:#EE7700;color:#fff;border:none;cursor:pointer;font-size:12px;letter-spacing:1px;">
      PREVIEW CTA (na 4 vragen)
    </button>
  </div>

  <script src="/arnobot-widget.js"></script>
  <script>
    function previewCTA() {
      var messages = document.getElementById('arnobot-messages');
      if (!messages) return;
      var el = document.createElement('div');
      el.className = 'ab-cta';
      el.innerHTML = [
        '<p class="ab-cta-heading">Je bent door je vragen heen. Wat nu?</p>',
        '<div class="ab-cta-cards">',
        '<div class="ab-cta-card ab-cta-card--primary">',
        '<div class="ab-cta-card-title">PRAAT MET ARNO</div>',
        '<div class="ab-cta-card-body">Niet de bot. Arno zelf. 30 minuten, gratis, geen verplichtingen.</div>',
        '<a href="https://arno.to/arnolive" target="_blank" class="ab-cta-btn--primary">PLAN EEN GRATIS GESPREK &rarr;</a>',
        '</div>',
        '<div class="ab-cta-card ab-cta-card--secondary">',
        '<div class="ab-cta-card-title">ARNOBOT UNLIMITED</div>',
        '<div class="ab-cta-card-body">Oneindig doorvragen. Tot je een ons weegt. Geen limiet, 24/7.</div>',
        '<a href="#" class="ab-cta-btn--secondary">ABONNEER &rarr;</a>',
        '</div>',
        '</div>',
      ].join('');
      messages.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  </script>

</body>
</html>
